  <style>
    :root {
      --primary: #0284c7;
      /* Sky 600 */
      --secondary: #14b8a6;
      /* Teal 500 */
      --deep: #0c4a6e;
      /* Sky 900 */
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      scroll-behavior: smooth;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      font-family: 'Outfit', sans-serif;
    }

    /* Water Theme Background */
    .bg-water-theme {
      background: linear-gradient(-45deg, #f0f9ff, #e0f2fe, #ecfeff, #eff6ff);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
    }

    @keyframes gradientBG {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    /* Wet Glass Effect */
    .glass-water {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
    }

    .glass-nav {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.5);
    }

    /* Text Gradient imitating shimmering water */
    .text-water-gradient {
      background: linear-gradient(to right, #0284c7, #0d9488);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Organic Liquid Blob Animation */
    .animate-blob {
      animation: blob 7s infinite;
    }

    .animation-delay-2000 {
      animation-delay: 2s;
    }

    .animation-delay-4000 {
      animation-delay: 4s;
    }

    @keyframes blob {
      0% {
        transform: translate(0px, 0px) scale(1);
      }

      33% {
        transform: translate(30px, -50px) scale(1.1);
      }

      66% {
        transform: translate(-20px, 20px) scale(0.9);
      }

      100% {
        transform: translate(0px, 0px) scale(1);
      }
    }

    .hover-float {
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .hover-float:hover {
      transform: translateY(-8px);
    }

    /* Wave Animations */
    .waves {
      position: relative;
      width: 100%;
      height: 100px;
      margin-bottom: -7px;
      /* Fix for gap */
      min-height: 80px;
      max-height: 120px;
    }

    .parallax>use {
      animation: move-forever 25s cubic-bezier(.55, .5, .45, .5) infinite;
    }

    .parallax>use:nth-child(1) {
      animation-delay: -2s;
      animation-duration: 7s;
      fill: rgba(14, 165, 233, 0.05);
      /* Sky 500 extremely light */
    }

    .parallax>use:nth-child(2) {
      animation-delay: -3s;
      animation-duration: 10s;
      fill: rgba(20, 184, 166, 0.05);
      /* Teal 500 extremely light */
    }

    .parallax>use:nth-child(3) {
      animation-delay: -4s;
      animation-duration: 13s;
      fill: rgba(2, 132, 199, 0.05);
      /* Sky 600 extremely light */
    }

    .parallax>use:nth-child(4) {
      animation-delay: -5s;
      animation-duration: 20s;
      fill: rgba(255, 255, 255, 0.1);
    }

    @keyframes move-forever {
      0% {
        transform: translate3d(-90px, 0, 0);
      }

      100% {
        transform: translate3d(85px, 0, 0);
      }
    }
  </style>
